name: Sync Fluentd Upstream

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check upstream for changes
        id: check-upstream
        run: |
          cd fluentd
          RESULT=$(./scripts/check-upstream.sh)
          echo "result=$RESULT" >> $GITHUB_OUTPUT
          echo "Upstream check result: $RESULT"

      - name: Exit if no changes
        if: steps.check-upstream.outputs.result != 'changed'
        run: |
          echo "No changes detected in upstream. Exiting."
          exit 0

      - name: Get latest upstream commit SHA
        if: steps.check-upstream.outputs.result == 'changed'
        id: get-sha
        run: |
          cd fluentd
          UPSTREAM_REPO="fluent/fluentd-docker-image"
          API_URL="https://api.github.com/repos/${UPSTREAM_REPO}/commits"
          TARGET_PATH="Dockerfile.template.erb"
          LATEST_COMMIT=$(python3 -c "
          import urllib.request, json, sys
          try:
              data = json.load(urllib.request.urlopen('${API_URL}?path=${TARGET_PATH}&per_page=1', timeout=30))
              print(data[0]['sha'] if data else '')
          except Exception:
              pass
          " 2>/dev/null || echo "")
          echo "sha=$LATEST_COMMIT" >> $GITHUB_OUTPUT
          echo "Latest upstream commit: $LATEST_COMMIT"

      - name: Clone upstream repository
        if: steps.check-upstream.outputs.result == 'changed'
        run: |
          git clone https://github.com/fluent/fluentd-docker-image.git /tmp/fluentd-docker-image

      - name: Clean existing Dockerfiles
        if: steps.check-upstream.outputs.result == 'changed'
        run: |
          cd fluentd
          make clean

      - name: Generate Dockerfiles for all versions and architectures
        if: steps.check-upstream.outputs.result == 'changed'
        run: |
          cd fluentd
          VERSION=1.17 ARCH=debian ./scripts/generate.sh
          VERSION=1.17 ARCH=arm64 ./scripts/generate.sh
          VERSION=1.17 ARCH=armhf ./scripts/generate.sh
          VERSION=1.18 ARCH=debian ./scripts/generate.sh
          VERSION=1.18 ARCH=arm64 ./scripts/generate.sh
          VERSION=1.18 ARCH=armhf ./scripts/generate.sh
          VERSION=1.19 ARCH=debian ./scripts/generate.sh
          VERSION=1.19 ARCH=arm64 ./scripts/generate.sh
          VERSION=1.19 ARCH=armhf ./scripts/generate.sh

      - name: Update .last-upstream-sync file
        if: steps.check-upstream.outputs.result == 'changed'
        run: |
          cd fluentd
          echo "${{ steps.get-sha.outputs.sha }}" > .last-upstream-sync

      - name: Check for conflicts
        if: steps.check-upstream.outputs.result == 'changed'
        id: check-conflicts
        run: |
          # Check if there are any changes to files outside of v*/ directories
          git add -A
          git status --porcelain | grep -E "^\s*M\s+fluentd/(v[0-9]+\.[0-9]+/|\.last-upstream-sync)" > /tmp/expected_changes.txt || true
          git status --porcelain | grep -vE "^\s*M\s+fluentd/(v[0-9]+\.[0-9]+/|\.last-upstream-sync)" | grep -vE "^\?\?" > /tmp/other_changes.txt || true
          
          if [ -s /tmp/other_changes.txt ]; then
            echo "conflict=true" >> $GITHUB_OUTPUT
            echo "Conflicts detected in non-Dockerfile files:"
            cat /tmp/other_changes.txt
          else
            echo "conflict=false" >> $GITHUB_OUTPUT
            echo "No conflicts - only Dockerfile changes detected"
          fi

      - name: Commit changes directly to main
        if: steps.check-upstream.outputs.result == 'changed' && steps.check-conflicts.outputs.conflict == 'false'
        run: |
          git add -A
          git commit -m "chore: sync with upstream fluentd-docker-image

Upstream commit: ${{ steps.get-sha.outputs.sha }}

Updated Dockerfiles:
- v1.17 (debian, arm64, armhf)
- v1.18 (debian, arm64, armhf)
- v1.19 (debian, arm64, armhf)"
          git push origin HEAD:main

      - name: Create Pull Request for conflicts
        if: steps.check-upstream.outputs.result == 'changed' && steps.check-conflicts.outputs.conflict == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sync/upstream-update-${{ github.run_number }}
          title: "[MANUAL REVIEW REQUIRED] Sync with upstream fluentd-docker-image"
          body: |
            Automated sync with upstream fluent/fluentd-docker-image repository.

            **⚠️ CONFLICTS DETECTED - Manual review required**

            Changes were detected in files outside of the generated Dockerfiles.
            This may indicate:
            - Upstream structural changes
            - Manual modifications that conflict with automation
            - New files that need review

            **Upstream commit:** ${{ steps.get-sha.outputs.sha }}

            **Please review all changes carefully before merging.**
          commit-message: "chore: sync with upstream fluentd-docker-image (with conflicts)"
          labels: automated, sync, needs-review
          delete-branch: true
