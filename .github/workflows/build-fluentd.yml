name: Build and Push Fluentd
on:
  push:
    branches:
      - master
    paths:
      - fluentd/**
  pull_request:
    types:
      - closed
    branches:
      - master
    paths:
      - fluentd/**
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [1.17, 1.18, 1.19]
        arch: [debian, arm64, armhf]
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./fluentd/v${{ matrix.version }}/${{ matrix.arch }}
          push: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true) }}
          tags: kiennt26/fluentd:v${{ matrix.version }}-${{ matrix.arch }}-1.0
          platforms: linux/amd64,linux/arm64,linux/arm/v7

